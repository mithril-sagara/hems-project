services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    # ホストモード時はports指定不要ですが、管理用に残しておきます
    ports:
      - "8086:8086"
    environment:
      - TZ=Asia/Tokyo
      - INFLUXDB_INIT_MODE=setup
      - INFLUXDB_INIT_USERNAME=admin
      - INFLUXDB_INIT_PASSWORD=password1234
      - INFLUXDB_INIT_ORG=my-home
      - INFLUXDB_INIT_BUCKET=energy_bucket
      - INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  hems-app:
    build: .
    container_name: hems_app
    # 重要：これでパワコン(192.168.0.142)と直接通信可能になります
    network_mode: "host"
    restart: unless-stopped
    depends_on:
      - influxdb
    environment:
      - TZ=Asia/Tokyo  # これでコンテナ内の時刻が日本時間になります
      - HEMS_IP=192.168.0.142
      - INFLUX_URL=http://localhost:8086
      - INFLUX_TOKEN=my-super-secret-auth-token
      - INFLUX_ORG=my-home
      - INFLUX_BUCKET=energy_bucket
    volumes:
      - .:/app
    working_dir: /app

volumes:
  influxdb_data:
